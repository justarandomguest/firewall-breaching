<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firewall Breach: Advanced Hack</title>
<style>
body { margin:0; background:black; color:lime; font-family:monospace; text-align:center; overflow:hidden; }
canvas { display:block; margin:0 auto; background:#020; border:2px solid lime; }
.screen { position:absolute; top:30%; width:100%; }
button { padding:10px 20px; background:black; color:lime; border:2px solid lime; cursor:pointer; }
</style>
</head>
<body>

<div id="startScreen" class="screen">
<h1>💻 Firewall Breach</h1>
<p>Stealth hack the router. Stay undetected.</p>
<button onclick="startGame()">Start Hack</button>
</div>

<div id="gameOverScreen" class="screen" style="display:none;">
<h1 id="endTitle"></h1>
<p id="finalScore"></p>
<button onclick="startGame()">Retry</button>
</div>

<div id="cutsceneScreen" class="screen" style="display:none;">
<h1 id="cutsceneTitle">...</h1>
<p id="cutsceneText"></p>
</div>

<canvas id="gameCanvas" width="600" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let stage, score, gameRunning;
let phase = 1; // NEW: second phase later
let player = { x: 300, y: 250, size: 10, speed: 4 };
let keys = {};

let wires = [], codeBlocks = [], scanners = [], rain = [];
let password = "", input = "";

// Controls
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  if (stage === 3 && gameRunning) {
    if (e.key.length === 1) input += e.key;
    if (e.key === "Backspace") input = input.slice(0, -1);
    if (input === password) setTimeout(nextStage, 200);
  }
});
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
document.addEventListener("click", handleClick);

function startGame() {
  stage = 1; score = 0; phase = 1;
  player.x = 300; player.y = 250;
  hideAllScreens();
  loadStage();
  gameRunning = true;
  gameLoop();
}

function hideAllScreens() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";
  document.getElementById("cutsceneScreen").style.display = "none";
}


function loadStage() {
  wires = []; codeBlocks = []; scanners = []; input = "";

  rain = Array(80).fill(0).map(()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height}));
  // PHASE 1
  if (phase === 1) {
    if (stage === 1) { for(let i=0;i<5;i++) wires.push({x:80+i*90, cut:false}); createScanners(1); }
    else if (stage === 2) { for(let i=0;i<6;i++) codeBlocks.push({x:Math.random()*550,y:Math.random()*450,size:30}); createScanners(2); }
    else if (stage === 3) { password = "h"+Math.floor(Math.random()*10); createScanners(2); }
    else if (stage === 4) { for(let i=0;i<4;i++) codeBlocks.push({x:100+i*100,y:Math.random()*400,size:40}); createScanners(3); }
    else playEndAnimation();
  }

  // PHASE 2 (HARDER)
  if (phase === 2) {
    if (stage === 1) { for(let i=0;i<7;i++) wires.push({x:50+i*70, cut:false}); createScanners(3); }
    else if (stage === 2) { for(let i=0;i<10;i++) codeBlocks.push({x:Math.random()*550,y:Math.random()*450,size:25}); createScanners(4); }
    else if (stage === 3) { password = "x"+Math.floor(Math.random()*99); createScanners(4); }
    else if (stage === 4) { for(let i=0;i<8;i++) codeBlocks.push({x:Math.random()*550,y:Math.random()*450,size:35}); createScanners(5); }
    else if (stage === 5) { for(let i=0;i<12;i++) codeBlocks.push({x:Math.random()*550,y:Math.random()*450,size:20}); createScanners(6); }
    else endGame(true);
  }
}

function createScanners(n) {
  for(let i=0;i<n;i++) scanners.push({x:Math.random()*canvas.width,y:0,speed:2+Math.random()*3});
}

function nextStage() { stage++; loadStage(); }


function update() {
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;

  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  scanners.forEach(s=>{
    s.y += s.speed;
    if (player.x < s.x+20 && player.x+player.size>s.x && player.y<s.y+20 && player.y+player.size>s.y) {
      endGame(false);
    }
    if (s.y>canvas.height){s.y=0; s.x=Math.random()*canvas.width;}
  });

  if (stage===1 && wires.every(w=>w.cut)) nextStage();
  if ((stage===2 || stage===4 || stage===5) && codeBlocks.length===0) nextStage();
  score+=0.1;
}

function handleClick() {
  if (!gameRunning) return;

  wires.forEach(w=>{
    if (!w.cut && Math.abs(player.x-w.x)<20){w.cut=true; score+=10;}
  });
  codeBlocks = codeBlocks.filter(c=>{
    let hit = player.x>c.x && player.x<c.x+c.size && player.y>c.y && player.y<c.y+c.size;
    if(hit) score+=20;
    return !hit;
  });
}

function drawRain(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="lime";
  rain.forEach(r=>{ctx.fillText(Math.random()>0.5?"1":"0",r.x,r.y); r.y+=4; if(r.y>canvas.height)r.y=0;});
}

function draw(){
  drawRain();

  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,player.size,player.size);
  ctx.fillStyle="red";
  scanners.forEach(s=>ctx.fillRect(s.x,s.y,20,20));
  wires.forEach(w=>{
    ctx.strokeStyle=w.cut?"gray":"cyan";
    ctx.beginPath(); ctx.moveTo(w.x,0); ctx.lineTo(w.x,canvas.height); ctx.stroke();
  });
  codeBlocks.forEach(c=>{ctx.fillStyle="orange"; ctx.fillRect(c.x,c.y,c.size,c.size);});
  ctx.fillStyle="yellow";
  if(stage===3) {
    ctx.fillText("Password: "+password,10,20);
    ctx.fillText("Input: "+input,10,40);
  }

  ctx.fillStyle="lime";
  ctx.fillText("Score: "+Math.floor(score),10,480);
}

function gameLoop(){
  if(!gameRunning)return;
  update(); draw();
  requestAnimationFrame(gameLoop);
}

function endGame(win){
  gameRunning=false;
  document.getElementById("gameOverScreen").style.display="block";
  document.getElementById("endTitle").innerText = win?"✅ FINAL HACK COMPLETE":"🚫 TRACE DETECTED";
  document.getElementById("finalScore").innerText = "Score: "+Math.floor(score);
}

// NEW CINEMATIC SEQUENCE
function playEndAnimation(){
  gameRunning=false;
  const screen = document.getElementById("cutsceneScreen");
  const title = document.getElementById("cutsceneTitle");
  const text = document.getElementById("cutsceneText");
  screen.style.display="block";


  const scenes = [
    {title:"Shutting Down...", text:"You quietly close your laptop."},
    {title:"...", text:"You walk out of school into the dark."},
    {title:"", text:""},
    {title:"BOOTING UP", text:"010101010101010101010101"},
    {title:"SYSTEM ONLINE", text:"Firewall detected again..."}
  ];

  let i=0;
  function next(){
    if(i<scenes.length){      title.innerText=scenes[i].title;
      text.innerText=scenes[i].text;
      i++;
      if(i===3){document.body.style.background="black";} // blackout moment
      setTimeout(next,2000);
    } else {
      // start harder phase
      phase=2;
      stage=1;
      hideAllScreens();
      gameRunning=true;
      loadStage();
      gameLoop();
    }
  }

  next();
}
</script>

</body>
