<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firewall Breach: Router Hack</title>
<style>
body { margin:0; background:black; color:lime; font-family:monospace; text-align:center; }
canvas { display:block; margin:20px auto; background:#111; border:2px solid lime; }
.screen { position:absolute; top:30%; width:100%; }
button { padding:10px 20px; background:black; color:lime; border:2px solid lime; cursor:pointer; }
</style>
</head>
<body>

<div id="startScreen" class="screen">
<h1>💻 Firewall Breach</h1>
<p>Cut wires. Delete code. Stay undetected.</p>
<button onclick="startGame()">Start Hack</button>
</div>

<div id="gameOverScreen" class="screen" style="display:none;">
<h1>🚫 Trace Detected</h1>
<p id="finalScore"></p>
<button onclick="startGame()">Retry</button>
</div>

<canvas id="gameCanvas" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let stage = 1;
let score = 0;
let gameRunning = false;

// Player is a cursor
let player = { x: 250, y: 250, size: 12, speed: 5 };

let wires = [];
let codeBlocks = [];
let keys = {};

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);
document.addEventListener("click", handleClick);

function startGame() {
  stage = 1;
  score = 0;
  player.x = 250;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameOverScreen").style.display = "none";
  loadStage();
  gameRunning = true;
  gameLoop();
}

function loadStage() {
  wires = [];
  codeBlocks = [];

  if (stage === 1) {
    // wires to cut
    for (let i = 0; i < 5; i++) {
      wires.push({ x: 50 + i * 80, y: 200, cut: false });
    }
  } else if (stage === 2) {
    // code blocks to delete
    for (let i = 0; i < 6; i++) {
      codeBlocks.push({ x: Math.random() * 450, y: Math.random() * 450, size: 30 });
    }
  } else {
    endGame(true);
  }
}

function update() {
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;

  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // Stage completion checks
  if (stage === 1 && wires.every(w => w.cut)) {
    stage++;
    loadStage();
  }

  if (stage === 2 && codeBlocks.length === 0) {
    stage++;
    loadStage();
  }
}

function handleClick() {
  if (!gameRunning) return;

  if (stage === 1) {
    wires.forEach(w => {
      if (!w.cut && Math.abs(player.x - w.x) < 15) {
        w.cut = true;
        score += 10;
      }
    });
  }

  if (stage === 2) {
    codeBlocks = codeBlocks.filter(c => {
      let hit = player.x > c.x && player.x < c.x + c.size &&
                player.y > c.y && player.y < c.y + c.size;
      if (hit) score += 20;
      return !hit;
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Stage visuals
  if (stage === 1) {
    ctx.fillStyle = "yellow";
    ctx.fillText("Stage 1: Cut the wires (click near them)", 10, 20);

    wires.forEach(w => {
      ctx.strokeStyle = w.cut ? "gray" : "red";
      ctx.beginPath();
      ctx.moveTo(w.x, 0);
      ctx.lineTo(w.x, canvas.height);
      ctx.stroke();
    });
  }

  if (stage === 2) {
    ctx.fillStyle = "yellow";
    ctx.fillText("Stage 2: Delete firewall code (click blocks)", 10, 20);

    ctx.fillStyle = "red";
    codeBlocks.forEach(c => {
      ctx.fillRect(c.x, c.y, c.size, c.size);
    });
  }

  ctx.fillStyle = "lime";
  ctx.fillText("Score: " + score, 10, 40);
}

function gameLoop() {
  if (!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function endGame(win=false) {
  gameRunning = false;
  document.getElementById("gameOverScreen").style.display = "block";
  document.getElementById("finalScore").innerText = win ?
    "Hack Complete! Score: " + score :
    "Score: " + score;
}
</script>

</body>
</html>
